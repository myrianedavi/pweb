<!DOCTYPE html>
<html lang="en">
<head>
     <title>Fontes e Cores </title>
    <meta charset="UTF-8">
    <style type="text/css">

.fonteSerif {
    font-family: "Trebuchet MS", Lucida Sans Unicode, Lucida Grande, Lucida Sans, Arial, sans-serif;
    font-size: 80px;
    font-style: oblique;
}

.fonteSans-Serif {
    font-family: "Lucida Sans", Lucida Sans Regular, Lucida Grande, Lucida Sans Unicode, Verdana, sans-serif;
     font-size: 80px;
    font-style: italic;
}

.fonteMonospace {
    font-family: "Impact", Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    font-size: 20px;
    font-style: bold;
}


    </style>
   
</head>
<body>
    
    <div class=conteudo>
        <p class="fonteSerif">Programação Web</p>
         <p class="fonteSans-Serif">Programação Web</p>
          <p class="fonteMonospace">Programação Web</p>

    </div>



</body>

</html>
