<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noticias</title>
    <link rel="stylesheet" href="style.css">

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: #e8ecef;
}

.topo{
    background: #00897b;
    color:white;
    text-align: center;
    padding: 20px;
    margin-bottom: 30px;
}

main{
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}

.card{
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
}

.card header{
    color:#00897b;
    font-weight: bold;
    margin-bottom: 10px;
}

.card img{
    width: 150px;
    height: 100px;
    float: right;
    margin-left: 15px;
    border-radius: 8px;
}

.card h2{
    font-size: 22px;
    margin-bottom: 10px;

}


.card p{
    text-align: justify;
    line-height: 1.6;
}

.card footer{
    clear:both;
    margin-top: 20px;
    border-top: 1px solid #ddd;
    padding-top: 10px;
    color:grey;
    font-size: 14px;
}
</style>

</head>
