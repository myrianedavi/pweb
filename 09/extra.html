<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>extra</title>

<style>

 body{
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
 }

.header{
    background-color: lightblue;
    width: 100%;
    height: 60px;
    line-height: 60px;
    position: fixed;
    top: 0;
    left: 0;
}


.container{
    display: flex;
    margin-top: 60px;
    height: 400px;
}

.left{
    background-color: lightcoral;
    width: 25%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.center{
    background-color: lightgreen;
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.right{
    background-color: lightcoral;
    width: 25%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.footer{
    background-color: lightpink;
    width: 100%;
    height: 50px;
    line-height: 50px;
}



</style>


</head>
<body>
    
<div class="header">
    Header100%
</div>

<div class="container">
    <div class="left">
        Left25%
    </div>

    <div class="center">
        Center50%
    </div>

    <div class="right">
        Right25%
    </div>
</div>

<div class="footer">
    Footer100%
</div>



</body>

</html>
